<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register for Courses | Campus Course Connect</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Campus Course Connect</h1>
      <nav aria-label="Main navigation">
        <ul class="menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="browse.html">Browse Courses</a></li>
          <li><a href="register.html">Register</a></li>
          <li><a href="view.html">View Registered Courses</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container form-page">
    <section>
      <h2>Course Registration</h2>
      <p>Complete the form below to register for your selected classes.</p>
      <form>
        <fieldset>
          <legend>Student Information</legend>
          <div class="form-group">
            <label for="student-name">Student Name</label>
            <input type="text" id="student-name" name="student-name" placeholder="Enter your full name" required />
          </div>
          <div class="form-group">
            <label for="student-id">Student ID</label>
            <input type="text" id="student-id" name="student-id" placeholder="Enter your student ID" required />
          </div>
          <div class="form-group">
            <label for="student-email">Email Address</label>
            <input type="email" id="student-email" name="student-email" placeholder="name@example.edu" required />
          </div>
        </fieldset>

        <fieldset>
          <legend>Course Selection</legend>
          <div class="form-group">
            <label for="course-select">Choose a Course</label>
            <select id="course-select" name="course-select">
              <option value="BUS101">BUS 101: Introduction to Business</option>
              <option value="ECON202">ECON 202: Microeconomics</option>
              <option value="DATA305">DATA 305: Business Analytics</option>
              <option value="MKTG210">MKTG 210: Digital Marketing</option>
            </select>
          </div>
          <div class="form-group">
            <label for="semester">Semester</label>
            <input type="text" id="semester" name="semester" placeholder="Fall 2026" required />
          </div>
          <div class="form-group checkbox-group">
            <input type="checkbox" id="notify" name="notify" />
            <label for="notify">Receive registration confirmation email</label>
          </div>
        </fieldset>

        <button type="submit" class="button">Submit Registration</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Bill Sause &copy; 2026</p>
    </div>
  </footer>
</body>
</html>
